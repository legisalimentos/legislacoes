<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Preview do Logo LegisAlimentos</title>
<style>
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:#f8fafc; font-family: system-ui, sans-serif; }
  .box { text-align:center; padding: 40px; }
  .logo-wrap { width: 400px; height: 400px; background:white; border-radius: 50%; box-shadow: 0 25px 60px rgba(0,0,0,0.15); display:flex; align-items:center; justify-content:center; margin: 0 auto 20px; }
  .logo-wrap svg { width: 90%; height: 90%; }
  h1 { color:#0f172a; font-size: 20px; margin: 10px 0 4px; }
  p { color:#64748b; font-size: 14px; }
</style>
</head>
<body>
  <div class="box">
    <div class="logo-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" aria-label="Logo LegisAlimentos">
        <defs>
          <linearGradient id="blueRing" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1e3a5f"/>
            <stop offset="100%" stop-color="#0f1f3a"/>
          </linearGradient>
          <linearGradient id="greenRing" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#2e7d32"/>
            <stop offset="100%" stop-color="#1b5e20"/>
          </linearGradient>
          <linearGradient id="leafGrad" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#1b5e20"/>
            <stop offset="50%" stop-color="#388e3c"/>
            <stop offset="100%" stop-color="#66bb6a"/>
          </linearGradient>
          <linearGradient id="grainGold" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#f9a825"/>
            <stop offset="100%" stop-color="#c9a227"/>
          </linearGradient>
        </defs>
        <circle cx="300" cy="300" r="280" fill="none" stroke="url(#blueRing)" stroke-width="22"/>
        <circle cx="300" cy="300" r="240" fill="none" stroke="url(#greenRing)" stroke-width="14" stroke-dasharray="0 30 200 30 200 30"/>
        <path d="M 300 480 Q 220 420 200 320 Q 240 360 300 380 Q 260 440 300 480 Z" fill="url(#leafGrad)" opacity="0.95"/>
        <path d="M 300 480 Q 380 420 400 320 Q 360 360 300 380 Q 340 440 300 480 Z" fill="url(#leafGrad)" opacity="0.95"/>
        <path d="M 300 460 Q 240 400 230 320 Q 270 360 300 370 Q 280 410 300 460 Z" fill="url(#leafGrad)" opacity="0.85"/>
        <path d="M 300 460 Q 360 400 370 320 Q 330 360 300 370 Q 320 410 300 460 Z" fill="url(#leafGrad)" opacity="0.85"/>
        <g transform="translate(195,180)">
          <line x1="0" y1="0" x2="0" y2="120" stroke="url(#grainGold)" stroke-width="3"/>
          <ellipse cx="-10" cy="15" rx="6" ry="12" fill="url(#grainGold)" transform="rotate(-30 -10 15)"/>
          <ellipse cx="10" cy="15" rx="6" ry="12" fill="url(#grainGold)" transform="rotate(30 10 15)"/>
          <ellipse cx="-12" cy="35" rx="6" ry="12" fill="url(#grainGold)" transform="rotate(-30 -12 35)"/>
          <ellipse cx="12" cy="35" rx="6" ry="12" fill="url(#grainGold)" transform="rotate(30 12 35)"/>
          <ellipse cx="-13" cy="55" rx="6" ry="12" fill="url(#grainGold)" transform="rotate(-30 -13 55)"/>
          <ellipse cx="13" cy="55" rx="6" ry="12" fill="url(#grainGold)" transform="rotate(30 13 55)"/>
          <ellipse cx="-14" cy="75" rx="6" ry="12" fill="url(#grainGold)" transform="rotate(-30 -14 75)"/>
          <ellipse cx="14" cy="75" rx="6" ry="12" fill="url(#grainGold)" transform="rotate(30 14 75)"/>
          <ellipse cx="0" cy="0" rx="5" ry="11" fill="url(#grainGold)"/>
        </g>
        <g transform="translate(265,160)">
          <line x1="0" y1="0" x2="0" y2="140" stroke="url(#grainGold)" stroke-width="3"/>
          <ellipse cx="-11" cy="18" rx="7" ry="13" fill="url(#grainGold)" transform="rotate(-30 -11 18)"/>
          <ellipse cx="11" cy="18" rx="7" ry="13" fill="url(#grainGold)" transform="rotate(30 11 18)"/>
          <ellipse cx="-13" cy="40" rx="7" ry="13" fill="url(#grainGold)" transform="rotate(-30 -13 40)"/>
          <ellipse cx="13" cy="40" rx="7" ry="13" fill="url(#grainGold)" transform="rotate(30 13 40)"/>
          <ellipse cx="-14" cy="62" rx="7" ry="13" fill="url(#grainGold)" transform="rotate(-30 -14 62)"/>
          <ellipse cx="14" cy="62" rx="7" ry="13" fill="url(#grainGold)" transform="rotate(30 14 62)"/>
          <ellipse cx="-15" cy="84" rx="7" ry="13" fill="url(#grainGold)" transform="rotate(-30 -15 84)"/>
          <ellipse cx="15" cy="84" rx="7" ry="13" fill="url(#grainGold)" transform="rotate(30 15 84)"/>
          <ellipse cx="-15" cy="106" rx="7" ry="13" fill="url(#grainGold)" transform="rotate(-30 -15 106)"/>
          <ellipse cx="15" cy="106" rx="7" ry="13" fill="url(#grainGold)" transform="rotate(30 15 106)"/>
          <ellipse cx="0" cy="0" rx="6" ry="13" fill="url(#grainGold)"/>
        </g>
        <g transform="translate(300,310)">
          <rect x="-6" y="-110" width="12" height="120" fill="#1e3a5f" rx="3"/>
          <rect x="-90" y="-50" width="180" height="12" fill="#1e3a5f" rx="3"/>
          <rect x="-12" y="-118" width="24" height="14" fill="#1e3a5f" rx="2"/>
          <ellipse cx="0" cy="15" rx="40" ry="10" fill="#1e3a5f"/>
          <line x1="-70" y1="-50" x2="-70" y2="10" stroke="#1e3a5f" stroke-width="2.5"/>
          <path d="M -100 10 L -40 10 L -70 30 Z" fill="#1e3a5f"/>
          <line x1="70" y1="-50" x2="70" y2="10" stroke="#1e3a5f" stroke-width="2.5"/>
          <path d="M 40 10 L 100 10 L 70 30 Z" fill="#1e3a5f"/>
          <path d="M -95 12 L -45 12 L -70 28 Z" fill="#0f1f3a" opacity="0.5"/>
          <path d="M 45 12 L 95 12 L 70 28 Z" fill="#0f1f3a" opacity="0.5"/>
          <rect x="-2" y="-105" width="3" height="100" fill="#3b6ea5" opacity="0.6"/>
        </g>
        <path d="M 170 380 Q 140 340 150 280 Q 175 310 185 360 Q 180 380 170 380 Z" fill="url(#leafGrad)" opacity="0.7"/>
        <path d="M 430 380 Q 460 340 450 280 Q 425 310 415 360 Q 420 380 430 380 Z" fill="url(#leafGrad)" opacity="0.7"/>
      </svg>
    </div>
    <h1>LegisAlimentos</h1>
    <p>Logo embutido em SVG (preview isolado)</p>
  </div>
</body>
</html>
